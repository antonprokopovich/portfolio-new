  - title: Вклад в open source
    layout: text
    content: |
      Я сделал _небольшой_ вклад в некоторые проекты open-source сообщества:
      - Нашёл [ошибку](https://github.com/metal-stack/go-ipam/issues/112) в Golang-библиотеке управления IP-адресами и [добавил юнит-тест](https://github.com/metal-stack/go-ipam/pull/113/files) для её воспроизведения.
      - Нашёл [ошибку](https://github.com/jackc/pgx/issues/1470) с приведением типов в Golang-библиотеке драйвера Postgres pgx/v5, которая была [воспроизведена и исправлена](https://github.com/jackc/pgx/commit/e48e7a7189354fd7d2990b8abc2c40dfe5ee4c9f) автором библиотеки.

  - title: Прочее
    layout: text
    content: |
      Помимо разработки ПО и информатики, меня также интересуют:
      - Машинное обучение и ИИ.
      - Нейробиология. Мне нравится изучать как функционирует человеческий мозг на фундаментальном уровне.
      - Чтение. В свободное время я читаю как техническую, так и художественную литературу.
      - Здоровье и фитнес. Я играл в баскетбол в школе и был игроком юношеской сборной России до 16 лет. Мне нравятся силовые тренировки и всё, что связано со здоровым образом жизни.

