content:
  - title: Experience # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: left
        title: Sber.Infra
        link: www.sberbank.com
        link_text: sberbank.com
        sub_title: |
          Software Engineer
          (Golang)
        caption: 2022 - Present
        description: | # this will include new lines to allow paragraphs
          #### Key projects 
          
          The key projects I have been involved in and the years of their release.
          
          <ins>Managed Kubernetes Platform</ins> (2023)
          
            The Managed Kubernetes platform is used by majority of tech teams at Sber - the largest bank in Russia.
            The platform consists of multitude of microservices. The majority of those microservices are various k8s-controllers, backends and componets that implement integrations with other services of the Cloud platform.
          
          <ins>Managed Namespaces</ins>  (2024) 
          
            A platform that allows users to manage namespaces in kubernetes clusters. The managed namespaces are also used to implement the communal (shared) kubernetes clusters which helps to better utilize clusters' compute resources. 

          <ins>Managed ML Inference Platform</ins>  (2025) 
        
            The platform provides functionality to simplify and optimize the following stages of working with Machine Learning models:
            - Preparing and allocating the resources (GPU/CPU/RAM) and infrastructure for running ML models.
            - Deploying and scaling models in distributed Kubernetes clusters.
            - Building model ensembles.
            - Running inference on deployed models.
            - Collecting and displaying metrics, logs and traces of deployed models.

          #### Additional roles
          
            Starting from the year 2024 I've been leading sub-teams of 2-6 software engineers. So besides the development work I'm also responsible for translating business goals and requirements into technical tasks, assigning those tasks to the team members, doing code reviews and testing, preparing releases, taking part in designing systems architecture and removing blockers for the team.
            
            I'm also responsible for interviewing Golang developers in multiple teams and departments. 
                      
            Other than that, I'm a member of the Sber Golang Experts Team (~20 people). The team is responsible for improving and developing Golang-related tools and processes across the organization.

      - layout: left
        title: Bitsgap
        link: www.bitsgap.com
        link_text: bitsgap.com
        sub_title: "Software Engineer\n(Golang)"
        caption: 2022
        description: | # this will include new lines to allow paragraphs
          #### Key projects
          
          <ins>DCA Trading Bot Backend</ins>  (2022) 
          
          During my time at Bitsgap I worked on a cryptocurrency trading bot that implemented [DCA](https://en.wikipedia.org/wiki/Dollar_cost_averaging) trading strategy.
          
          Besides implementing new features and improving performance, I also refactored the backend architecture and
          introduced the automated testing practices to the project.
      - layout: left
        title: Zyfra Robotics
        link: www.zyfra.com/industries/robotics
        link_text: zyfra.com
        sub_title: "Software Engineer\n(Python, Robotics)"
        caption: 2018 - 2022
        description: | # this will include new lines to allow paragraphs
          
          #### Key projects
          
          At Zyfra Robotics I worked on automating vehicles (trucks, drilling rigs) in the mining industry. Despite it being my first software engineering job I ended up as the main developer on the following projects because I was the only developer on a team of two – just me and my team lead/architect.           
          
          <ins>Drilling Rig Robot Controll Software</ins>  (2019) 
          
          I was responsible for the development of the software that controlled the [drilling rig robots](https://www.youtube.com/watch?v=B3JCit_YW5U&ab_channel=ZyfraCompany) and the infrastructure that supported them. The controll software development involved a lot mathematics (geometry, probability, linear argebra) and control theory (PID regulators, Path-Finding Algorithms, Kalman Filters).
          
          <ins>Remote Controll Station Desktop App</ins>  (2020) 
          
          A desktop app that allowed the drilling rigs to be controlled remotely using the remote-controll station built by our engineers.
          
          <ins>Planning and Observability Backend</ins>  (2020)
        
          Besides the controll software I developed the backend that communicated with all robotic vehicles on the mine, gathered telemetry from them, sent them tasks. The backend also provided REST API for sending plans of tasks to robots (through a Web interface) and observing their current state.
        
          <ins>3D Simulator</ins>  (2021) 
        
          I worked on a 3D-simulator of the drilling rig which we later used for testing the main system.
        
          The automonous self-driving drilling rig was deployed on mines in Russia and Peru.

