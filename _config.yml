        sub_title: BSc Business Administration
        description: | # this will include new lines to allow paragraphs
          I became a finalist of the [Global UGRAD](https://exchanges.state.gov/non-us/program/global-undergraduate-exchange-program-global-ugrad) scholarship program and went to study to the [Presbyterian College](https://en.wikipedia.org/wiki/Presbyterian_College) for a semester.
          
          I [scored 97](images/TOEFL_iBT.pdf) on my TOEFL exam which was a part of the Global UGRAD scholarship selection process.
          
          In addition to my business major curriculum at Presbyterian College, I took logic courses as electives.

      - layout: left
        title: Russian State University for the Humanities
        caption: 2014 - 2018
        sub_title: BSc Human Resources Management
        description: | # this will include new lines to allow paragraphs
          I received a [bachelor's degree](images/bachelors_degree.jpg) in Human Resources Management from [RSUH](https://en.wikipedia.org/wiki/Russian_State_University_for_the_Humanities). After the second year I started spending all my spare time studying [machine learning](images/mipt_yandex_ml_supervised.pdf), [mathematics and programming](images/mipt_yandex_math.pdf). 

  - title: Personal projects # Title for the section
    sub_title: Some of the pet-projects I've worked on in my spare time.
    layout: list # Type of content section (list/text)
    content:
      - layout: left
        title: Two-Layer Feedforward Neural Network
        link: github.com/antonprokopovich/NeuralNet
        # link_text: Project Website
        additional_links:
          - title: antonprokopovich/NeuralNet
            icon: fab fa-github
            url: github.com/antonprokopovich/NeuralNet
        description: | # this will include new lines to allow paragraphs
          Two-layer feed-forward neural network that solves a classic problem of handwritten digits classification. Implemented from scratch in pure Python (numpy being the only third-party dependency).
      - layout: left
        title: Threads.net API wrapper in Golang
        link: github.com/antonprokopovich/go-threads
        # link_text: Project Website
        additional_links:
          - title: antonprokopovich/go-threads
            icon: fab fa-github
            url: github.com/antonprokopovich/go-threads
        description: | # this will include new lines to allow paragraphs
          I've reverse-engineered API for Threads.net the first days it came out and created a Golang wrapper for it.

  - title: Open source contributions
    layout: text
    content: |
      I've made a few _minor_ contributions to some projects in the open-source community:
      - Found [an issue](https://github.com/metal-stack/go-ipam/issues/112) in a Golang IP-management library and [added a unit test](https://github.com/metal-stack/go-ipam/pull/113/files) to reproduce it.
      - Found [an issue](https://github.com/jackc/pgx/issues/1470) with type casting in the Golang Postgres driver library pgx/v5 which was [reproduced and fixed](https://github.com/jackc/pgx/commit/e48e7a7189354fd7d2990b8abc2c40dfe5ee4c9f) by the library author. 

  - title: Other
    layout: text
    content: | # this will include new lines to allow paragraphs
      Besides software engineering and computer science some of my other interests are:
      - Machine Learning and AI.
      - Neuroscience. I enjoy learning about how human brain functions at a fundamental level.
      - Reading. In my spare time I read both technical and fiction literature. Planning to add my reading list on here.
      - Health and Fitness. I played basketball for 10 years in my youth and was a member of Russian U16 National Team. I enjoy weightlifting and learning/practicing anything related to becoming stronger and healthier.

# Russian content
content_ru:
  - title: Опыт работы
    layout: list
    content:
      - layout: left
        title: Sber.Infra
        link: www.sberbank.com
        link_text: sberbank.com
        sub_title: |
          Software Engineer
          (Golang)
        caption: 2022 - настоящее время
        description: |
          #### Ключевые проекты

          Ключевые проекты, в которых я участвовал, и годы их выпуска.

          <ins>Managed Kubernetes Platform</ins> (2023)

            Платформа Managed Kubernetes используется большинством технических команд Сбера — крупнейшего банка в России.
            Платформа состоит из множества микросервисов. Большинство из них — различные k8s-контроллеры, бэкенды и компоненты, реализующие интеграции с другими сервисами облачной платформы.

          <ins>Managed Namespaces</ins> (2024)

            Платформа, позволяющая пользователям управлять пространствами имён (namespaces) в кластерах Kubernetes. Managed namespaces также используются для реализации коммунальных (общих) кластеров Kubernetes, что помогает лучше утилизировать вычислительные ресурсы кластеров.

          <ins>Managed ML Inference Platform</ins> (2025)

            Платформа предоставляет функциональность для упрощения и оптимизации следующих этапов работы с моделями машинного обучения:
            - Подготовка и выделение ресурсов (GPU/CPU/RAM) и инфраструктуры для запуска ML-моделей.
            - Деплой и масштабирование моделей в распределённых кластерах Kubernetes.
            - Построение ансамблей моделей.
            - Запуск инференса на развёрнутых моделях.
            - Сбор и отображение метрик, логов и трейсов развёрнутых моделей.

          #### Дополнительные роли

            Начиная с 2024 года я руковожу подкомандами из 2-6 инженеров-разработчиков. Помимо разработки я также отвечаю за трансляцию бизнес-целей и требований в технические задачи, распределение задач между членами команды, код-ревью и тестирование, подготовку релизов, участие в проектировании архитектуры систем и устранение блокеров для команды.

            Также я отвечаю за проведение собеседований разработчиков на Golang в нескольких командах и департаментах.

            Кроме того, я являюсь членом команды экспертов Сбера по Golang (~20 человек). Команда отвечает за улучшение и развитие инструментов и процессов, связанных с Golang, по всей организации.

      - layout: left
        title: Bitsgap
        link: www.bitsgap.com
        link_text: bitsgap.com
        sub_title: "Software Engineer\n(Golang)"
        caption: 2022
        description: |
          #### Ключевые проекты

          <ins>DCA Trading Bot Backend</ins> (2022)

          В Bitsgap я работал над торговым ботом для криптовалют, реализующим стратегию [DCA](https://ru.wikipedia.org/wiki/%D0%A3%D1%81%D1%80%D0%B5%D0%B4%D0%BD%D0%B5%D0%BD%D0%B8%D0%B5_%D0%B4%D0%BE%D0%BB%D0%BB%D0%B0%D1%80%D0%BE%D0%B2%D0%BE%D0%B9_%D1%81%D1%82%D0%BE%D0%B8%D0%BC%D0%BE%D1%81%D1%82%D0%B8) (усреднение долларовой стоимости).

          Помимо реализации новых функций и улучшения производительности, я провёл рефакторинг архитектуры бэкенда и внедрил практики автоматизированного тестирования в проект.

      - layout: left
        title: Zyfra Robotics
        link: www.zyfra.com/industries/robotics
        link_text: zyfra.com
        sub_title: "Software Engineer\n(Python, Robotics)"
        caption: 2018 - 2022
        description: |

          #### Ключевые проекты

          В Zyfra Robotics я работал над автоматизацией транспортных средств (грузовиков, буровых установок) в горнодобывающей промышленности. Несмотря на то что это была моя первая работа в качестве разработчика, я стал основным разработчиком в следующих проектах, так как был единственным разработчиком в команде из двух человек — я и мой тимлид/архитектор.

          <ins>ПО управления роботом буровой установки</ins> (2019)

          Я отвечал за разработку программного обеспечения, управляющего [роботами буровых установок](https://www.youtube.com/watch?v=B3JCit_YW5U&ab_channel=ZyfraCompany), и поддерживающей их инфраструктуры. Разработка ПО управления включала много математики (геометрия, теория вероятностей, линейная алгебра) и теории управления (ПИД-регуляторы, алгоритмы поиска пути, фильтры Калмана).

          <ins>Десктопное приложение станции дистанционного управления</ins> (2020)

          Десктопное приложение, позволяющее управлять буровыми установками удалённо с помощью станции дистанционного управления, построенной нашими инженерами.

          <ins>Бэкенд планирования и наблюдаемости</ins> (2020)

          Помимо ПО управления, я разработал бэкенд, который взаимодействовал со всеми роботизированными транспортными средствами на шахте, собирал с них телеметрию, отправлял им задачи. Бэкенд также предоставлял REST API для отправки планов задач роботам (через веб-интерфейс) и наблюдения за их текущим состоянием.

          <ins>3D-симулятор</ins> (2021)

          Я работал над 3D-симулятором буровой установки, который мы затем использовали для тестирования основной системы.

          Автономная самоуправляемая буровая установка была развёрнута на шахтах в России и Перу.

